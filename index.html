<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolMind 138 - Вход</title>
    <meta name="description" content="Школа №138, Челябинск. Вход в систему SchoolMind 138.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="Логотип сайта.png?v=2" type="image/png">
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body class="landing-page">
    <main class="landing-shell">
        <section class="landing-stage landing-stage--centered">
            <aside class="login-panel login-panel--wide surface-card">
                <div class="login-panel-header">
                    <div class="login-mark">
                        <img class="brand-seal" src="Логотип сайта.png?v=2" alt="Логотип школы №138">
                    </div>

                    <div class="section-header section-header--compact">
                        <p class="eyebrow">Вход</p>
                        <h2>Школа №138</h2>
                    </div>
                </div>

                <form id="login-form" class="form-stack" onsubmit="doLogin(event)" onkeydown="handleLoginKeydown(event)">
                    <div class="form-group">
                        <label for="login-email">Логин</label>
                        <input type="text" id="login-email" placeholder="admin138" autocomplete="username" autocapitalize="none" required>
                    </div>

                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" placeholder="Пароль" autocomplete="current-password" required>
                    </div>

                    <button type="submit" class="btn-primary">Открыть кабинет</button>
                    <p class="error-msg" id="login-error" aria-live="polite"></p>
                </form>
            </aside>
        </section>
    </main>

    <script src="js/app.js?v=7"></script>
</body>
</html>
