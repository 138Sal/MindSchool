<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolMind 138 - Кабинет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="Логотип сайта.png?v=2" type="image/png">
    <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand-lockup">
                <img class="brand-seal" src="Логотип сайта.png?v=2" alt="Логотип школы №138">
                <div class="brand-lockup-copy">
                    <div class="nav-brand">SchoolMind 138</div>
                    <div class="brand-subtitle">Школа №138, Челябинск</div>
                </div>
            </div>

            <div class="nav-user">
                <span id="user-name"></span>
                <button class="btn-logout" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <main class="page-shell stack-lg">
        <section class="masthead masthead--compact surface-card surface-card--compact">
            <div class="section-header section-header--compact">
                <p class="eyebrow">Кабинет</p>
                <h1 id="page-title">Добро пожаловать</h1>
            </div>
        </section>

        <section id="student-panel" class="dashboard-panel" style="display: none;">
            <article class="panel-card panel-card--dense">
                <span class="badge">Тест</span>
                <h3>Пройти тест</h3>
                <a href="student/test.html" class="btn-primary">Начать</a>
            </article>

            <article class="panel-card panel-card--dense">
                <span class="badge">История</span>
                <h3>Результаты тестов</h3>
                <a href="student/history.html" class="btn-secondary">Открыть</a>
            </article>
        </section>

        <section id="psychologist-panel" class="dashboard-panel" style="display: none;">
            <article class="panel-card panel-card--dense">
                <span class="badge">Ученики</span>
                <h3>Доступы и выдача</h3>
                <a href="admin.html" class="btn-primary">Открыть</a>
            </article>

            <article class="panel-card panel-card--dense">
                <span class="badge">Журнал</span>
                <h3>Все результаты</h3>
                <a href="psychologist/table.html" class="btn-secondary">Открыть</a>
            </article>

            <article class="panel-card panel-card--dense">
                <span class="badge">Сводка</span>
                <h3>Статистика по школе</h3>
                <a href="psychologist/stats.html" class="btn-secondary">Открыть</a>
            </article>
        </section>
    </main>

    <script src="js/app.js?v=7"></script>
    <script>
        checkAuth();
    </script>
</body>
</html>
